<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky; top:0; z-index:100; background:#FAF6EE; border-bottom:1px solid #E4DBC6; box-shadow:0 1px 0 rgba(43,38,32,0.03);">
  <div style="max-width:1240px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
    <a href="Home.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <img src="./assets/logo-icon.png" alt="Assisted Living Finder logo" style="height:48px; width:48px; border-radius:10px; object-fit:cover; object-position:center 40%; background:#8FCB9F; flex-shrink:0;" />
      <span style="font-family:'Fraunces',serif; font-weight:600; font-size:19px; color:#2F4A3D; line-height:1.1;">Assisted Living<br/><span style="font-size:13px; letter-spacing:0.14em; font-weight:500; color:#C89A4B; font-family:'Inter',sans-serif;">FINDER</span></span>
    </a>

    <sc-if value="{{ showDesktopNav }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex; align-items:center; gap:28px; font-family:'Inter',sans-serif; font-size:15px; font-weight:500;">
        <a href="Home.dc.html" style="{{ navLinkStyle_home }}">Home</a>
        <a href="About.dc.html" style="{{ navLinkStyle_about }}">About Ronald</a>
        <a href="Services.dc.html" style="{{ navLinkStyle_services }}">Services</a>
        <a href="Area-Tupelo.dc.html" style="{{ navLinkStyle_tupelo }}">Tupelo</a>
        <a href="Area-Amory.dc.html" style="{{ navLinkStyle_amory }}">Amory</a>
        <a href="Contact.dc.html" style="{{ navLinkStyle_contact }}">Contact</a>
      </nav>
    </sc-if>

    <div style="display:flex; align-items:center; gap:12px;">
      <a href="tel:+16623154460" style="display:flex; align-items:center; gap:8px; background:#2F4A3D; color:#FAF6EE; padding:11px 20px; border-radius:8px; text-decoration:none; font-family:'Inter',sans-serif; font-weight:600; font-size:15px; white-space:nowrap;" style-hover="background:#223529;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        (662) 315-4460
      </a>
      <sc-if value="{{ showMobileToggle }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ toggleMenu }}" aria-label="Toggle menu" style="background:none; border:1px solid #D8CBA9; border-radius:8px; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2F4A3D" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </sc-if>
    </div>
  </div>

  <sc-if value="{{ showMobileMenu }}" hint-placeholder-val="{{ false }}">
    <nav style="display:flex; flex-direction:column; padding:8px 24px 20px; gap:4px; font-family:'Inter',sans-serif; font-size:16px; font-weight:500; border-top:1px solid #E4DBC6;">
      <a href="Home.dc.html" style="{{ navLinkStyle_home }} padding:10px 0;">Home</a>
      <a href="About.dc.html" style="{{ navLinkStyle_about }} padding:10px 0;">About Ronald</a>
      <a href="Services.dc.html" style="{{ navLinkStyle_services }} padding:10px 0;">Services</a>
      <a href="Area-Tupelo.dc.html" style="{{ navLinkStyle_tupelo }} padding:10px 0;">Tupelo</a>
      <a href="Area-Amory.dc.html" style="{{ navLinkStyle_amory }} padding:10px 0;">Amory</a>
      <a href="Contact.dc.html" style="{{ navLinkStyle_contact }} padding:10px 0;">Contact</a>
    </nav>
  </sc-if>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;currentPage&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;,&quot;about&quot;,&quot;services&quot;,&quot;tupelo&quot;,&quot;amory&quot;,&quot;contact&quot;]}}">
class Component extends DCLogic {
  state = { isMobile: false, menuOpen: false };

  componentDidMount() {
    this.check = () => this.setState({ isMobile: window.innerWidth < 880 });
    this.check();
    window.addEventListener('resize', this.check);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this.check);
  }

  linkStyle(active) {
    return active
      ? "color:#2F4A3D; text-decoration:none; font-weight:700; border-bottom:2px solid #C89A4B;"
      : "color:#5B5548; text-decoration:none;";
  }

  renderVals() {
    const page = this.props.currentPage || '';
    const isMobile = this.state.isMobile;
    return {
      showDesktopNav: !isMobile,
      showMobileToggle: isMobile,
      showMobileMenu: isMobile && this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      navLinkStyle_home: this.linkStyle(page === 'home'),
      navLinkStyle_about: this.linkStyle(page === 'about'),
      navLinkStyle_services: this.linkStyle(page === 'services'),
      navLinkStyle_tupelo: this.linkStyle(page === 'tupelo'),
      navLinkStyle_amory: this.linkStyle(page === 'amory'),
      navLinkStyle_contact: this.linkStyle(page === 'contact'),
    };
  }
}

</script>
</body>
</html>
